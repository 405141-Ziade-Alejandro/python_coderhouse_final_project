{% extends "core/base.html" %}

{% block title %}
    <title>Perfil</title>
{% endblock %}

{% block content %}

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card p-4 text-light">
                <h2 class="mb-3 text-center">Perfil</h2>

                <hr>
                {% if user.profile.avatar %}
                    <img src="{{ user.profile.avatar.url }}" width="150">
                {% else %}
                    <p>No tiene avatar</p>
                {% endif %}

                <p><strong>Username:</strong> {{ user.username }}</p>
                <p><strong>Email:</strong> {{ user.email }}</p>

                <hr>

                <div class="d-grid gap-2">
                    <a href="{% url 'edit-profile' %}" class="btn btn-outline-light">
                        Editar perfil
                    </a>

                    <a href="{% url 'password-change' %}" class="btn btn-warning">
                        Cambiar contraseña
                    </a>

                    <a href="/logout/" class="btn btn-danger">
                        Logout
                    </a>
                </div>
            </div>

        </div>
    </div>

{% endblock %}
