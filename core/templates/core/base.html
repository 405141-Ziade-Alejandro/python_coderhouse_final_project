<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    {% block title %}
    <title>IT Inventario</title>
    {% endblock %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
        }

        .navbar {
            background-color: #1f1f1f;
        }

        .card {
            background-color: #1e1e1e;
            border: none;
        }

        .footer {
            background-color: #1f1f1f;
            padding: 15px;
            margin-top: 40px;
            text-align: center;
            color: #aaa;
        }

        a {
            color: #9ecbff;
        }

        a:hover {
            color: #ffffff;
        }
    </style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">IT inventario</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- LEFT -->
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'index' %}">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'about' %}">Acerca</a>
                </li>

                <!-- ejemplo futuro -->
                <li class="nav-item">
                    <a class="nav-link" href="/supplies/">Insumos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/workstations/">Work Stations</a>
                </li>
            </ul>

            <!-- RIGHT -->
            <ul class="navbar-nav">

                {% if user.is_authenticated %}

                    <li class="nav-item">
                        <a class="nav-link" href="/profile/">Profile</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/logout/">Logout</a>
                    </li>

                {% else %}

                    <li class="nav-item">
                        <a class="nav-link" href="/login/">Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/signup/">Sign up</a>
                    </li>

                {% endif %}

            </ul>
        </div>
    </div>
</nav>


<!-- CONTENT -->
<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>


<!-- FOOTER -->
<div class="footer">
    <p>IT Inventory System - Django Project</p>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
